# Custom pf ruleset = macOS defaults (Apple anchors) + the hestia-ingress rdr anchor. Loading this keeps
# Apple's built-in anchors intact while adding our :80 -> :30080 redirect. Anchors MUST stay in pf's
# required order (scrub, nat, rdr, dummynet, filter).
scrub-anchor "com.apple/*"
nat-anchor "com.apple/*"
rdr-anchor "com.apple/*"
rdr-anchor "hestia-ingress"
dummynet-anchor "com.apple/*"
anchor "com.apple/*"
load anchor "com.apple" from "/etc/pf.anchors/com.apple"
load anchor "hestia-ingress" from "/etc/pf.anchors/hestia-ingress"
