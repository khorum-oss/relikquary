# Relikquary on Kubernetes — LOCAL DEV stack (the k8s counterpart of deploy/docker-compose.dev.yml).
# PostgreSQL + backend (auth OFF) + frontend, self-contained in the `relikquary-dev` namespace with
# throwaway dev credentials. Everything is reachable via NodePort so it works out-of-the-box on a local
# cluster (Docker Desktop, kind, minikube, k3d).
#
#   # Build the images and make them available to the cluster first (this project pushes no registry):
#   docker build -f deploy/backend.Dockerfile  -t relikquary-backend:local  .
#   docker build -f deploy/frontend.Dockerfile -t relikquary-frontend:local .
#   #   kind:     kind load docker-image relikquary-backend:local relikquary-frontend:local
#   #   minikube: minikube image load relikquary-backend:local relikquary-frontend:local
#   #   Docker Desktop k8s shares the local image store — nothing extra needed.
#
#   kubectl apply -f deploy/k8s/relikquary-dev.yaml
#
#   API / Maven repos : http://localhost:30080/<repo>/...   (NodePort)
#   UI                : http://localhost:30081              (NodePort)
#   # If NodePort localhost access doesn't work for your cluster (e.g. plain kind), port-forward instead:
#   kubectl -n relikquary-dev port-forward svc/relikquary-backend 8080:8080
#   kubectl -n relikquary-dev port-forward svc/relikquary-frontend 8081:8080
#
#   Tear it all down:  kubectl delete namespace relikquary-dev
#
# WARNING: auth is DISABLED and credentials are throwaway — anyone who can reach these ports can
# publish/resolve/manage. This file is for local development only; never expose it.
---
apiVersion: v1
kind: Namespace
metadata:
  name: relikquary-dev
  labels:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/part-of: relikquary
    environment: dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: relikquary-config
  namespace: relikquary-dev
data:
  # Dev only: no authentication, so anyone can publish/resolve/manage locally.
  RELIKQUARY_SECURITY_ENABLED: "false"
  RELIKQUARY_STORAGE_ROOT: "/data"
  # Dev only: structured per-request access log ON (feature 010) so you can see every resolve/publish
  # hit the server (the 'relikquary.access' logger). Off by default in the shipped config.
  RELIKQUARY_OBSERVABILITY_REQUEST_LOG_ENABLED: "true"
  # Application state (tokens/users/settings/history) in PostgreSQL (feature 016). To use embedded
  # SQLite instead, set the backend to "sqlite", point RELIKQUARY_DB_PATH at the data PVC, and delete
  # the postgres resources + the wait-for-postgres init container.
  RELIKQUARY_PERSISTENCE_BACKEND: "postgres"
  RELIKQUARY_DB_URL: "jdbc:postgresql://relikquary-postgres:5432/relikquary"
  RELIKQUARY_DB_USER: "relikquary"
  # Upstream proxy defaults (override if you mirror them internally):
  RELIKQUARY_MAVEN_CENTRAL_URL: "https://repo1.maven.org/maven2"
  RELIKQUARY_GRADLE_PLUGIN_PORTAL_URL: "https://plugins.gradle.org/m2/"
---
apiVersion: v1
kind: Secret
metadata:
  name: relikquary-secrets
  namespace: relikquary-dev
type: Opaque
stringData:
  # Throwaway dev PostgreSQL password — shared by the postgres container (POSTGRES_PASSWORD) and the
  # backend (RELIKQUARY_DB_PASSWORD). Fine to commit for local dev; do NOT reuse anywhere real.
  RELIKQUARY_DB_PASSWORD: "relikquary"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: relikquary-data
  namespace: relikquary-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: relikquary-postgres-data
  namespace: relikquary-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-postgres
  namespace: relikquary-dev
  labels:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: relikquary
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relikquary
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70 # the alpine postgres user
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "relikquary"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: relikquary-config
                  key: RELIKQUARY_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: relikquary-secrets
                  key: RELIKQUARY_DB_PASSWORD
            # Sub-directory so the volume mount root isn't the data directory.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "relikquary", "-d", "relikquary"]
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "relikquary", "-d", "relikquary"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: relikquary-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: relikquary-postgres
  namespace: relikquary-dev
spec:
  selector:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-backend
  namespace: relikquary-dev
  labels:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: backend
spec:
  # ReadWriteOnce PVC ⇒ single replica (fine for dev).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: relikquary
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relikquary
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        # Numeric UID/GID of the image's `relikquary` user (useradd --system ⇒ 999). A numeric runAsUser
        # is required so the kubelet can verify the container is non-root; fsGroup makes the data PVC
        # group-writable by that user.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      # Wait for PostgreSQL so the app doesn't crash-loop on first apply. Remove if using SQLite.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z relikquary-postgres 5432; do echo waiting for postgres; sleep 2; done"]
          # The pod runs runAsNonRoot; busybox defaults to root, so pin this init container to a non-root
          # UID (nobody). `nc` needs no privileges.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
      containers:
        - name: backend
          image: relikquary-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: relikquary-config
            - secretRef:
                name: relikquary-secrets
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: relikquary-data
---
apiVersion: v1
kind: Service
metadata:
  name: relikquary-backend
  namespace: relikquary-dev
spec:
  # Fixed API / Maven port via two stable paths from one service:
  #   - LoadBalancer `port: 8081` → on Docker Desktop binds http://localhost:8081.
  #   - pinned `nodePort: 30081`  → works on every cluster (kind/minikube where the LB stays <pending>),
  #     reachable at http://<node>:30081 with no port-forward needed.
  # A NodePort can't itself be 8081 (k8s restricts NodePorts to 30000–32767), hence the LoadBalancer
  # for the nice localhost:8081 plus the pinned NodePort for portability.
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8081
      targetPort: 8080
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-frontend
  namespace: relikquary-dev
  labels:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relikquary
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relikquary
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: relikquary-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # The backend Service listens on 8081 (see its LoadBalancer above), so the UI must proxy
            # there — not 8080. 8081 is the backend's canonical port, in-cluster and externally.
            - name: RELIKQUARY_BACKEND
              value: "http://relikquary-backend:8081"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: relikquary-frontend
  namespace: relikquary-dev
spec:
  # NodePort with no fixed nodePort ⇒ Kubernetes auto-assigns a free external port. Internal ports
  # stay standard (8080). Find it with:  kubectl -n relikquary-dev get svc relikquary-frontend
  type: NodePort
  selector:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
