# Production sizing — bigger resource envelopes and a second (stateless) frontend replica. The backend
# stays at a single replica because its artifact PVC is ReadWriteOnce; switch storage to S3 to scale it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-postgres
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-frontend
spec:
  replicas: 2
---
# PVC sizes match the live cluster's default `local-path` StorageClass (10Gi), which has NO expansion
# (allowVolumeExpansion unset) and does NOT enforce the request as a quota — pods can already use the full
# node disk (~98GB Colima VM). So bigger numbers here are fiction (and cause ArgoCD SyncFailed on the
# forbidden resize — see hestia-systems HS-10). To truly grow: migrate to an expandable StorageClass
# (e.g. Longhorn) or grow the Colima VM disk — not a size bump here.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: relikquary-data
spec:
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: relikquary-postgres-data
spec:
  resources:
    requests:
      storage: 10Gi
