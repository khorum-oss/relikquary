# Stage ingress (host-based). The frontend image is a smart reverse proxy: it serves the SPA and proxies
# the API (/api/...) and every Maven repository path to the backend, same-origin — so the primary host
# points entirely at the frontend and needs no per-path rules. A second host routes straight to the
# backend as an escape hatch for tooling that should bypass the SPA. Plain HTTP (no TLS) for LAN use;
# reach it via the ingress-nginx NodePort (colima forwards it on the LAN) or the :80 pf redirect.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relikquary
  annotations:
    # TLS from the internal CA (cert-manager issues relikquary-tls from the `hestia-ca` ClusterIssuer).
    # Serve HTTPS on the ingress https NodePort (:30443); keep ssl-redirect OFF so plain HTTP on :30080
    # still works — under NodePort a 308 would redirect to :443 (no listener) and dead-end. Trust the CA
    # per ops/reference/tls-device-trust.md to get a valid lock.
    cert-manager.io/cluster-issuer: hestia-ca
    nginx.ingress.kubernetes.io/ssl-redirect: "false"      # HTTP :30080 stays; HTTPS on :30443 — don't 308 (NodePort has no :443)
    nginx.ingress.kubernetes.io/proxy-body-size: "0"       # large artifact uploads (Maven/OCI)
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stage.lan-domain
        - stage.lan-ip.nip.io
        - stage-api.lan-domain
        - stage-api.lan-ip.nip.io
      secretName: relikquary-tls
  rules:
    # `lan-domain` (your chosen host suffix, e.g. `home`) and `lan-ip` (the host's LAN IP) are
    # placeholders — fill both in with deploy/host/render-lan-ip.sh before applying. *.<domain> names
    # need a hosts entry / local DNS; the *.nip.io names resolve publicly to the LAN IP
    # (anything.<ip>.nip.io -> <ip>) so phones and other devices work with no per-device setup. Left
    # unrendered these hosts never resolve, but the manifest is valid and applies cleanly.
    - host: stage.lan-domain            # UI + API + Maven (frontend proxies /api and repo paths to backend)
      http: &stage_ui
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: relikquary-frontend, port: { number: 8080 } } }
    - host: stage.lan-ip.nip.io
      http: *stage_ui
    - host: stage-api.lan-domain        # direct to the backend (skips the SPA) — handy for CI/Maven clients
      http: &stage_api
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: relikquary-backend, port: { number: 8080 } } }
    - host: stage-api.lan-ip.nip.io
      http: *stage_api
