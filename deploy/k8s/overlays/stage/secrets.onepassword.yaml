# 1Password → Kubernetes Secret sync for the STAGE environment.
#
# The 1Password Kubernetes Operator watches this OnePasswordItem and creates/updates a Secret with the
# SAME name (`relikquary-secrets`) in this namespace. Each field of the referenced vault item becomes a
# key in that Secret; the backend consumes it via `envFrom: secretRef` and PostgreSQL reads
# RELIKQUARY_DB_PASSWORD from it.
#
# Before this resolves, create the item in 1Password (see deploy/k8s/onepassword/README.md) with these
# fields — 1Password generates and stores the values:
#   RELIKQUARY_SECURITY_USERS_0_PASSWORD   e.g. {bcrypt}$2a$...   (MUST keep the {noop}/{bcrypt} prefix)
#   RELIKQUARY_DB_PASSWORD                  the PostgreSQL password (shared by postgres + backend)
#   RELIKQUARY_S3_ACCESS_KEY / _SECRET_KEY  only if you switch storage to S3
#
# itemPath is `vaults/<vault>/items/<item>` (names or IDs). Point stage at its own vault/item so rotating
# a stage password never touches prod.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: relikquary-secrets
spec:
  itemPath: "vaults/relikquary-stage/items/relikquary-secrets"
