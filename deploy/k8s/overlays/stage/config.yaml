# Stage-only config patch. Keeps stage's objects in their own top-level path in the shared Space so stage
# and prod never comingle (HS-11): with RELIKQUARY_S3_PREFIX=stage, keys land under `stage/…`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: relikquary-config
data:
  RELIKQUARY_S3_PREFIX: "stage"
