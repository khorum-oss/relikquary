# Backend (API + Maven repository protocol). Reads non-secret config from the `relikquary-config`
# ConfigMap and secrets from the `relikquary-secrets` Secret that the 1Password operator syncs from the
# vault. Artifact storage is on a ReadWriteOnce PVC ⇒ single replica; switch to S3 to scale beyond one.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: relikquary-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relikquary-backend
  labels:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: relikquary
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relikquary
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        # Numeric UID/GID of the image's `relikquary` user (useradd --system ⇒ 999). A numeric runAsUser
        # is required so the kubelet can verify the container is non-root; fsGroup makes the data PVC
        # group-writable by that user.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      # Wait for PostgreSQL before starting so the app doesn't crash-loop on first apply. Remove this
      # init container if you switch the backend to embedded SQLite.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z relikquary-postgres 5432; do echo waiting for postgres; sleep 2; done"]
          # The pod runs runAsNonRoot; busybox defaults to root, so pin this init container to a non-root
          # UID (nobody). `nc` needs no privileges.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
      containers:
        - name: backend
          image: relikquary-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: relikquary-config
            - secretRef:
                name: relikquary-secrets
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: appconfig               # deploy-layer Spring config (repository set incl. containers)
              mountPath: /config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: relikquary-data
        - name: appconfig
          configMap:
            name: relikquary-appconfig
---
apiVersion: v1
kind: Service
metadata:
  name: relikquary-backend
spec:
  selector:
    app.kubernetes.io/name: relikquary
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
