# Non-secret configuration shared by every environment. Secrets (passwords / keys) do NOT live here —
# they are synced from 1Password by the operator into the `relikquary-secrets` Secret (see the overlays
# and deploy/k8s/onepassword/README.md). Overlays may patch individual keys per environment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: relikquary-config
data:
  RELIKQUARY_STORAGE_ROOT: "/data"
  RELIKQUARY_SECURITY_USERS_0_USERNAME: "publisher"
  RELIKQUARY_SECURITY_USERS_0_ROLES_0: "PUBLISH"
  # Application state (tokens/users/settings/history) in PostgreSQL. The password comes from the
  # 1Password-synced Secret. The service name is identical in every namespace, so this needs no per-env
  # patch. To use embedded SQLite instead (single replica only), set the backend to "sqlite", set
  # RELIKQUARY_DB_PATH to a path on the data PVC, and drop the postgres resources from the base.
  RELIKQUARY_PERSISTENCE_BACKEND: "postgres"
  RELIKQUARY_DB_URL: "jdbc:postgresql://relikquary-postgres:5432/relikquary"
  RELIKQUARY_DB_USER: "relikquary"
  # Upstream proxy defaults (override per environment if you mirror them internally):
  RELIKQUARY_MAVEN_CENTRAL_URL: "https://repo1.maven.org/maven2"
  RELIKQUARY_GRADLE_PLUGIN_PORTAL_URL: "https://plugins.gradle.org/m2/"
  # --- S3 alternative (uncomment here, drop the backend data PVC, raise replicas) ---
  # RELIKQUARY_STORAGE_BACKEND: "s3"
  # RELIKQUARY_S3_ENDPOINT: "https://s3.example.com"
  # RELIKQUARY_S3_REGION: "us-east-1"
  # RELIKQUARY_S3_BUCKET: "relikquary"
