name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build & tests
    runs-on: ubuntu-latest
    env:
      # The round-trip test shells out to Maven; use the runner's preinstalled `mvn`
      # instead of the dev-environment default (/opt/maven/bin/mvn).
      MAVEN_EXECUTABLE: mvn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build (compile, detekt, tests, coverage, dependency verification)
        run: ./gradlew :backend:build --no-daemon --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/
          if-no-files-found: ignore

  frontend:
    name: Frontend check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Type-check
        working-directory: frontend
        run: npm run check
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Build Storybook component catalog
        working-directory: frontend
        run: npm run build-storybook

  e2e:
    name: Frontend e2e (real backend + Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build backend bootJar
        run: ./gradlew :backend:bootJar --no-daemon --stacktrace
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: bash frontend/scripts/e2e.sh
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
