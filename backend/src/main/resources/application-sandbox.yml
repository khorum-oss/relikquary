
relikquary:
  security:
    enabled: true
    users:
      - username: test
        password: "{noop}test_password"
        roles: [ PUBLISH ]
  storage:
    filesystem:
      root: ${RELIKQUARY_STORAGE_ROOT:./relikquary-store-local}

server:
  port: 8081

logging:
  level:
    # Verbose logging for local sandbox debugging: app DEBUG logs request arrival (the filter's "-->"
    # line) plus controller detail. Uncomment the Spring lines to trace why a request 404s (web) or is
    # rejected 401/403 (security) — e.g. when a proxied request "isn't coming through".
    org.khorum.oss.relikquary: DEBUG
    # org.springframework.web: DEBUG
    # org.springframework.security: DEBUG