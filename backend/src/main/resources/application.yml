relikquary:
  # Named, typed repositories, each addressed by a path prefix (/{repo}/...). There is no implicit
  # repository at the root. Types: release (immutable), snapshot (overwritable), mixed (both).
  repositories:
    - name: releases
      type: release
    - name: snapshots
      type: snapshot
  storage:
    # Storage backend: 'filesystem' (default) or 's3' (S3-compatible: AWS, DigitalOcean Spaces, MinIO).
    backend: filesystem
    # Final storage location for the filesystem backend. Override per environment
    # (e.g. --relikquary.storage.filesystem.root=/var/lib/relikquary) with no code change.
    filesystem:
      root: ${RELIKQUARY_STORAGE_ROOT:./relikquary-store}
    # S3 backend settings (used when backend=s3). Credentials come from env — never commit them.
    s3:
      endpoint: ${RELIKQUARY_S3_ENDPOINT:}
      region: ${RELIKQUARY_S3_REGION:us-east-1}
      bucket: ${RELIKQUARY_S3_BUCKET:}
      access-key: ${RELIKQUARY_S3_ACCESS_KEY:}
      secret-key: ${RELIKQUARY_S3_SECRET_KEY:}
      path-style-access: true
  publish:
    # Re-publish policy for an existing RELEASE coordinate: reject (default, immutable)
    # or overwrite. SNAPSHOT coordinates are always overwritable.
    release-policy: reject
  security:
    # Authentication is ON by default; publishing (PUT) requires a configured user with the
    # PUBLISH role, while reads (GET/HEAD) stay open. Set enabled: false to disable auth entirely
    # (e.g. local development — see the 'local' profile).
    enabled: true
    # Configure publishers here (passwords carry an encoder prefix, e.g. {bcrypt}... or {noop}...):
    # users:
    #   - username: ci
    #     password: "{bcrypt}$2a$10$..."
    #     roles: [PUBLISH]
    users: []

spring:
  application:
    name: relikquary
  servlet:
    multipart:
      # Artifacts are streamed as raw request bodies, not multipart form uploads.
      enabled: false
