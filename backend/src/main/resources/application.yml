relikquary:
  # Persistence backend for application state — API tokens, managed users, publish history, runtime
  # settings (feature 016, Phase 3). Artifact bytes are NOT stored here; they stay in 'storage' below.
  #   - sqlite (default): an embedded, file-backed database needing no external service.
  #   - postgres: an external PostgreSQL for shared / HA deployments.
  # Hibernate generates the schema per dialect (ddl-auto, default 'update'). Any spring.datasource.* /
  # spring.jpa.* key may still be set directly to override these derived defaults.
  persistence:
    backend: ${RELIKQUARY_PERSISTENCE_BACKEND:sqlite}
    sqlite:
      path: ${RELIKQUARY_DB_PATH:relikquary.db}
    postgres:
      # Only used when backend=postgres; blank otherwise. e.g. jdbc:postgresql://db:5432/relikquary
      url: ${RELIKQUARY_DB_URL:}
      username: ${RELIKQUARY_DB_USER:}
      password: ${RELIKQUARY_DB_PASSWORD:}

  # Named repositories, each addressed by a path prefix (/{repo}/...). There is no implicit
  # repository at the root. A repository's kind selects how it resolves:
  #   - hosted (default): stores artifacts locally; 'type' governs acceptance/mutability —
  #       release (immutable), snapshot (overwritable), mixed (both).
  #   - proxy: read-only; fetches from 'remoteUrl' on a cache miss and caches the bytes locally.
  #       maven-metadata.xml is always served fresh from upstream (never cached). Optional upstream
  #       credentials (remoteUsername/remotePassword) come from env — never commit them.
  #   - group: read-only; resolves 'members' in order and returns the first match.
  # Proxy and group repos reject publishing (405).
  #
  # Any repository may add an 'access' block to scope read/publish/delete to specific principals
  # (a username, or a role written "@role"). An action with no list keeps its default: read open;
  # publish/delete gated by the global PUBLISH role. An explicit list overrides that default. Example:
  #   - name: private-libs
  #     access:
  #       read:    [alice, "@platform"]
  #       publish: [alice]
  #       delete:  [alice]
  # Reads are gated on both the Maven path and the browse API; denied ⇒ 401 (anonymous) / 403 (authed).
  # When security.enabled is false, all per-repository rules are ignored.
  repositories:
    - name: releases
      type: release
    - name: snapshots
      type: snapshot
    - name: maven-central
      kind: proxy
      remoteUrl: ${RELIKQUARY_MAVEN_CENTRAL_URL:https://repo1.maven.org/maven2}
      # remoteUsername: ${RELIKQUARY_MAVEN_CENTRAL_USER:}
      # remotePassword: ${RELIKQUARY_MAVEN_CENTRAL_PASSWORD:}
    - name: gradle-plugins
      kind: proxy
      # The Gradle Plugin Portal, served as a Maven-layout repository. A Gradle build whose
      # pluginManagement repositories point at this server's 'public' group resolves plugin marker
      # POMs ({id}:{id}.gradle.plugin) and implementations through here, cached like any proxy.
      remoteUrl: ${RELIKQUARY_GRADLE_PLUGIN_PORTAL_URL:https://plugins.gradle.org/m2/}
    - name: public
      kind: group
      # Aggregate endpoint a build can point at for everything: local releases first, then Maven
      # Central, then the Gradle Plugin Portal (consulted last, so ordinary dependency misses don't
      # incur a portal round-trip). First match wins.
      members: [releases, maven-central, gradle-plugins]
    - name: plugins
      kind: group
      # Plugin-resolution endpoint for a build's pluginManagement.repositories. Portal FIRST, mirroring
      # gradlePluginPortal()'s ordering: the Plugin Portal and Maven Central ship byte-different jars for
      # some coordinates (e.g. org.jetbrains.kotlinx:kover-gradle-plugin), so resolving portal-first
      # keeps artifacts identical to what gradlePluginPortal() served — verification pins still match.
      # Use 'public' (Central-first) for ordinary dependencies; use 'plugins' for pluginManagement.
      members: [gradle-plugins, maven-central]
  storage:
    # Storage backend: 'filesystem' (default) or 's3' (S3-compatible: AWS, DigitalOcean Spaces, MinIO).
    backend: filesystem
    # Final storage location for the filesystem backend. Override per environment
    # (e.g. --relikquary.storage.filesystem.root=/var/lib/relikquary) with no code change.
    filesystem:
      root: ${RELIKQUARY_STORAGE_ROOT:./relikquary-store}
    # S3 backend settings (used when backend=s3). Credentials come from env — never commit them.
    s3:
      endpoint: ${RELIKQUARY_S3_ENDPOINT:}
      region: ${RELIKQUARY_S3_REGION:us-east-1}
      bucket: ${RELIKQUARY_S3_BUCKET:}
      access-key: ${RELIKQUARY_S3_ACCESS_KEY:}
      secret-key: ${RELIKQUARY_S3_SECRET_KEY:}
      path-style-access: true
  publish:
    # Re-publish policy for an existing RELEASE coordinate: reject (default, immutable)
    # or overwrite. SNAPSHOT coordinates are always overwritable.
    release-policy: reject
  security:
    # Authentication is ON by default; publishing (PUT) requires a configured user with the
    # PUBLISH role, while reads (GET/HEAD) stay open. Set enabled: false to disable auth entirely
    # (e.g. local development — see the 'local' profile).
    enabled: true
    # Configure publishers here (passwords carry an encoder prefix, e.g. {bcrypt}... or {noop}...):
    # users:
    #   - username: ci
    #     password: "{bcrypt}$2a$10$..."
    #     roles: [PUBLISH]
    users: []
  # Retention/cleanup (feature 009) reclaims storage. Off by default; enabling it runs cleanup every
  # 'interval'. Per-repository policies live in the 'retention' block on each repository above:
  #   - snapshot repos: retention.snapshot.{keepLast, maxAge} — keep the N newest builds and/or purge
  #       builds older than an age; the newest build and maven-metadata.xml are always kept; releases
  #       are never touched.
  #   - proxy repos: retention.cache.{maxAge, maxSize} — evict cached artifacts older than an age and/or
  #       keep the cache within a size budget; evicted artifacts re-fetch on the next request.
  # A repo without a 'retention' block is never cleaned. Trigger on demand with an authorized
  # POST /api/cleanup (optional ?dryRun=true reports the selection without deleting).
  cleanup:
    enabled: false
    interval: PT1H
  # Observability (feature 010). Liveness/readiness probes and Prometheus metrics are served under
  # /actuator (see the 'management' block below); only the probes are public — all other operational
  # endpoints require the global PUBLISH role when security is enabled (open when it is disabled).
  observability:
    request-log:
      # Opt-in structured (JSON) per-request log line on the 'relikquary.access' logger (method,
      # repository, path, status, bytes, duration, principal). Off by default; normal logging is
      # unchanged when off.
      enabled: false
      include-query-string: false
    # Cheap-probe TTL caches (keep readiness scrapes and the storage-usage gauge off the hot path).
    storage-probe-ttl: PT2S
    upstream-health-ttl: PT30S
    storage-usage-refresh: PT5M

# Operational surface (feature 010). Probes: /actuator/health/liveness (process) and
# /actuator/health/readiness (storage-gated). Metrics: /actuator/prometheus. A proxy-upstream outage
# surfaces as DEGRADED in the detailed health view (HTTP 200) without failing liveness/readiness.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      # Detail carries no secrets and the detailed endpoint is operator-gated when security is on, so
      # showing components is safe and gives local-dev parity when security is off.
      show-details: always
      show-components: always
      group:
        liveness:
          include:
            - livenessState
        readiness:
          include:
            - readinessState
            - storage
      status:
        # Severity order: a proxy-upstream outage is DEGRADED (less severe than DOWN) and maps to HTTP
        # 200 so the detailed health endpoint does not flap to 503 on a transient upstream blip. Setting
        # http-mapping replaces the defaults, so DOWN/OUT_OF_SERVICE → 503 must be restated here.
        order: [DOWN, OUT_OF_SERVICE, DEGRADED, UP, UNKNOWN]
        http-mapping:
          DOWN: 503
          OUT_OF_SERVICE: 503
          DEGRADED: 200

spring:
  application:
    name: relikquary
  servlet:
    multipart:
      # Artifacts are streamed as raw request bodies, not multipart form uploads.
      enabled: false
  jpa:
    # No open-session-in-view: persistence access is confined to the service/repository layer.
    open-in-view: false

logging:
  level:
    # RequestLoggingFilter logs one INFO line per request (status, method, URI, timing). Raise the app
    # package to DEBUG (see the 'sandbox'/'local' profiles) to also log request arrival and controller
    # detail; raise org.springframework.web / .security to DEBUG to trace dispatch, mapping, and auth.
    org.khorum.oss.relikquary: INFO
