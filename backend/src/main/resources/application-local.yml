# 'local' profile: frictionless local development.
# Activate with: ./gradlew :backend:bootRun --args='--spring.profiles.active=local'
# Auth is disabled so publishing needs no login, and artifacts land in a local directory.
relikqary:
  security:
    enabled: false
  storage:
    filesystem:
      root: ${RELIKQARY_STORAGE_ROOT:./relikqary-store-local}
